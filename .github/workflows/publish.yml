name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Capture lines between `## [<version>]` and the next `## ` heading.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION — add a '## [$VERSION]' heading before tagging."
            exit 1
          fi

          echo "--- Release notes preview ---"
          cat release_notes.md
          echo "-----------------------------"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: |
          for proj in BrowserApi BrowserApi.JSInterop BrowserApi.Blazor BrowserApi.Runtime BrowserApi.SourceGen BrowserApi.Css.SourceGen; do
            dotnet pack "src/$proj/$proj.csproj" -c Release -o ./nupkgs -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          files: ./nupkgs/*.nupkg
